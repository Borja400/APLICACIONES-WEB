<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 4</title>
<style>
body.oscuro {
    background-color: #222;
    color: white;
}
</style>
</head>
<body>

<h2>Modo oscuro / claro</h2>

<label>
    <input type="checkbox" id="modoOscuro"> Modo oscuro
</label>

<script>
document.getElementById("modoOscuro").addEventListener("change", function() {
    if (this.checked) {
        document.body.classList.add("oscuro");
    } else {
        document.body.classList.remove("oscuro");
    }
});
</script>

</body>
</html>
